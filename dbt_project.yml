name: 'dbt_cost_optimization_package'
version: '3.0.0'
config-version: 2

profile: 'dbt_cost_optimization_package'

model-paths: ["models"]
docs-paths: ["docs"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

require-dbt-version: [">=1.0.0"]

# Model configurations
models:
  dbt_cost_optimization_package:
    +schema: dbt_cost_optimization
    # Staging models - platform-specific data extraction
    staging:
      +materialized: view
      snowflake:
        +enabled: "{{ target.type == 'snowflake' }}"
      bigquery:
        +enabled: "{{ target.type == 'bigquery' }}"
      databricks:
        +enabled: "{{ target.type == 'databricks' }}"
      redshift:
        +enabled: "{{ target.type == 'redshift' }}"
    intermediate:
      +materialized: view
      snowflake:
        +enabled: "{{ target.type == 'snowflake' }}"
      bigquery:
        +enabled: "{{ target.type == 'bigquery' }}"
      databricks:
        +enabled: "{{ target.type == 'databricks' }}"
      redshift:
        +enabled: "{{ target.type == 'redshift' }}"
    marts:
      snowflake:
        clustering:
          +enabled: "{{ target.type == 'snowflake' }}"
          +tags: ['clustering']
        materialization:
          +enabled: "{{ target.type == 'snowflake' }}"
          +tags: ['materialization']
        warehouse:
          +enabled: "{{ target.type == 'snowflake' }}"
          +tags: ['warehouse']
      bigquery:
        +enabled: "{{ target.type == 'bigquery' }}"
      databricks:
        +enabled: "{{ target.type == 'databricks' }}"
      redshift:
        +enabled: "{{ target.type == 'redshift' }}"