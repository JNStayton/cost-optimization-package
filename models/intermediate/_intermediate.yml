version: 2

models:

  # ===========================================================================
  # int_query_history
  # ===========================================================================
  - name: int_query_history
    description: >
      Unified query execution history across all supported data platforms.
      Provides a consistent schema for analyzing query performance, spillage,
      scan efficiency, and compute utilization. Used by downstream fact models
      for cost optimization recommendations.
    config:
      materialized: ephemeral
    columns:
      - name: query_id
        description: Unique identifier for a query execution
        tests:
          - not_null
      - name: query_start_time
        description: Timestamp when query execution started
        tests:
          - not_null
      - name: query_hash
        description: Hash of normalized query text, used for grouping similar queries
      - name: warehouse_name
        description: Name of the compute resource (warehouse, queue, or reservation) used
      - name: warehouse_size
        description: Size or tier of the compute resource (e.g. XS, S, M, L)
      - name: total_elapsed_time_ms
        description: End-to-end query runtime in milliseconds (includes waiting + execution)
      - name: bytes_spilled_local
        description: Bytes spilled to local disk due to memory pressure
      - name: bytes_spilled_remote
        description: Bytes spilled to remote storage
      - name: query_text
        description: Full SQL text submitted by the user
      - name: session_id
        description: Session or connection identifier
      - name: execution_status
        description: "Query outcome, normalized to: SUCCESS, FAILED, CANCELLED"
      - name: bytes_scanned
        description: Total bytes scanned or read by the query
      - name: query_load_percent
        description: Percentage of the compute resource's total capacity consumed by this query
      - name: queued_overload_time_ms
        description: Milliseconds the query spent waiting because the compute resource was overloaded
      - name: statement_type
        description: Type of SQL statement (SELECT, INSERT, MERGE, CREATE TABLE, etc.)
      - name: execution_time_ms
        description: Pure execution time in milliseconds (excludes queueing)
      - name: partitions_scanned
        description: Number of partitions, blocks, or files actually read after pruning (Snowflake/Databricks-native concept)
      - name: partitions_total
        description: Total number of partitions, blocks, or files available for the queried tables
      - name: platform
        description: "Source data platform: snowflake, bigquery, redshift, or databricks"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['snowflake', 'bigquery', 'redshift', 'databricks']

  # ===========================================================================
  # int_tables
  # ===========================================================================
  - name: int_tables
    description: >
      Unified table metadata across all supported data platforms.
      Provides a consistent view of table properties including type, row count,
      clustering configuration, and lifecycle state. Used for clustering and
      partitioning key recommendations.
    config:
      materialized: ephemeral
    columns:
      - name: database_name
        description: Database, project, or catalog name containing the table
        tests:
          - not_null
      - name: schema_name
        description: Schema or dataset name containing the table
        tests:
          - not_null
      - name: table_name
        description: Name of the table
        tests:
          - not_null
      - name: table_id
        description: Internal platform-specific identifier for the table
      - name: table_type
        description: "Table type classification: BASE TABLE, VIEW, EXTERNAL TABLE, MATERIALIZED VIEW, etc."
      - name: row_count
        description: Approximate number of rows in the table
      - name: clustering_key
        description: Defined clustering or sort key (comma-separated column names)
      - name: is_transient
        description: Whether the table is transient or temporary (lacks full durability guarantees)
      - name: is_deleted
        description: Whether the table has been soft-deleted
      - name: platform
        description: "Source data platform: snowflake, bigquery, redshift, or databricks"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['snowflake', 'bigquery', 'redshift', 'databricks']


  # ===========================================================================
  # int_table_storage
  # ===========================================================================
  - name: int_table_storage
    description: >
      Unified table storage metrics across all supported data platforms.
      All storage values are normalized to bytes. Used for storage optimization
      recommendations and understanding data lifecycle costs.
    config:
      materialized: ephemeral
    columns:
      - name: database_name
        description: Database, project, or catalog name
        tests:
          - not_null
      - name: schema_name
        description: Schema or dataset name
        tests:
          - not_null
      - name: table_name
        description: Table name
        tests:
          - not_null
      - name: active_bytes
        description: Current/active storage in bytes
      - name: time_travel_bytes
        description: Time travel storage in bytes (Snowflake, BigQuery only)
      - name: failsafe_bytes
        description: Failsafe storage in bytes (Snowflake-only concept)
      - name: is_deleted
        description: Whether the table has been soft-deleted
      - name: platform
        description: "Source data platform: snowflake, bigquery, redshift, or databricks"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['snowflake', 'bigquery', 'redshift', 'databricks']

  # ===========================================================================
  # int_table_inventory
  # ===========================================================================
  - name: int_table_inventory
    description: >
      Platform-agnostic router to table inventory (tables + storage joined).
      Routes to int_snowflake__table_inventory, int_bigquery__table_inventory, etc.
      Marts should ref this model, not platform-specific table inventory models.
    config:
      materialized: ephemeral

  # ===========================================================================
  # int_table_query_stats_daily
  # ===========================================================================
  - name: int_table_query_stats_daily
    description: >
      Platform-agnostic router to daily table query statistics.
      Routes to int_snowflake__table_query_stats_daily, etc.
      Marts should ref this model, not platform-specific query stats models.
    config:
      materialized: ephemeral

  # ===========================================================================
  # int_dbt__relations
  # ===========================================================================
  - name: int_dbt__relations
    description: >
      Compile-time mapping between dbt model metadata and physical relation names.
      Used by recommendation marts to attribute findings back to dbt model unique IDs.
    columns:
      - name: platform
        description: Active adapter platform (snowflake, bigquery, redshift, databricks)
      - name: database_name
        description: Database/catalog name for the model relation
      - name: schema_name
        description: Schema/dataset name for the model relation
      - name: table_name
        description: Relation identifier (alias if present, otherwise model name)
      - name: dbt_model
        description: dbt unique_id for the model
      - name: model_name
        description: dbt model file name
      - name: alias
        description: Configured dbt alias used for the relation name
      - name: package_name
        description: dbt package where the model is defined
      - name: materialized
        description: dbt materialization configured for the model
      - name: relation_fqn
        description: Fully-qualified relation name (database.schema.table)

  # ===========================================================================
  # int_snowflake__table_inventory
  # ===========================================================================
  - name: int_snowflake__table_inventory
    description: >
      Snowflake table inventory combining table metadata and storage metrics.
      Contains active table-level size, row count, and clustering metadata used
      by multiple optimization marts.
    columns:
      - name: platform
        description: Source data platform identifier (snowflake)
      - name: database_name
        description: Snowflake database name
      - name: schema_name
        description: Snowflake schema name
      - name: table_name
        description: Snowflake table name
      - name: table_fqn
        description: Fully-qualified table name (database.schema.table)
      - name: table_type
        description: Snowflake native table type
      - name: normalized_table_type
        description: Human-readable table classification
      - name: row_count
        description: Approximate row count
      - name: clustering_key
        description: Clustering key definition, if configured
      - name: is_already_clustered
        description: Whether clustering key is configured
      - name: is_transient
        description: Whether table is transient
      - name: active_bytes
        description: Active storage bytes
      - name: size_gb
        description: Active storage converted to GB
      - name: approx_micropartitions
        description: Approximate micropartition count derived from active bytes

  # ===========================================================================
  # int_snowflake__query_table_access
  # ===========================================================================
  - name: int_snowflake__query_table_access
    description: >
      One row per (query_id, table) from Snowflake access_history. Flattens
      base_objects_accessed and objects_modified for exact object-level attribution
      without query_text scan. Used by table_query_stats_daily and recommendation marts.
    config:
      enabled: "{{ target.type == 'snowflake' and var('use_access_history_attribution', true) }}"
    columns:
      - name: query_id
        description: Snowflake query identifier (joins to query_history)
      - name: query_start_time
        description: Query start time from access_history
      - name: table_database
        description: Database from parsed objectName
      - name: table_schema
        description: Schema from parsed objectName
      - name: table_name
        description: Table from parsed objectName

  # ===========================================================================
  # int_snowflake__table_query_stats_daily
  # ===========================================================================
  - name: int_snowflake__table_query_stats_daily
    description: >
      Incremental daily query statistics by Snowflake table. Uses access_history
      (query_table_access) for attribution instead of query_text. Shared intermediate
      for clustering, spillage, compute efficiency, and join-pattern marts.
    columns:
      - name: table_query_stats_daily_key
        description: Surrogate key for stats_date + table relation
      - name: platform
        description: Source data platform identifier (snowflake)
      - name: stats_date
        description: Date grain of aggregated query statistics
      - name: table_database
        description: Snowflake database name
      - name: table_schema
        description: Snowflake schema name
      - name: table_name
        description: Snowflake table name
      - name: total_query_count
        description: Total count of successful queries matched to the table
      - name: select_count
        description: Count of SELECT queries
      - name: dml_count
        description: Count of INSERT/UPDATE/DELETE/MERGE queries
      - name: select_execution_time_ms_sum
        description: Sum of execution_time_ms for matched SELECT queries
      - name: select_partitions_scanned_sum
        description: Sum of partitions_scanned for matched SELECT queries
      - name: select_partitions_total_sum
        description: Sum of partitions_total for matched SELECT queries
      - name: bytes_scanned_sum
        description: Sum of bytes scanned across matched queries
      - name: bytes_spilled_local_sum
        description: Sum of local spill bytes across matched queries
      - name: bytes_spilled_remote_sum
        description: Sum of remote spill bytes across matched queries

  # ===========================================================================
  # int_snowflake__table_columns
  # ===========================================================================
  - name: int_snowflake__table_columns
    description: >
      Column metadata for all active Snowflake tables, scoped to tables present in
      int_snowflake__table_inventory. Excludes unsupported data types (VARIANT, ARRAY,
      OBJECT, GEOGRAPHY, GEOMETRY) and deleted columns. Real cardinality for these columns
      is populated separately by the refresh_column_cardinality macro into
      int_snowflake__column_cardinality.
    columns:
      - name: database_name
        description: Snowflake database name (uppercased)
      - name: schema_name
        description: Snowflake schema name (uppercased)
      - name: table_name
        description: Table name (uppercased)
      - name: table_fqn
        description: Fully-qualified table name in DATABASE.SCHEMA.TABLE format (uppercased)
      - name: column_name
        description: Column name
      - name: ordinal_position
        description: Column position in the table definition (1-based)
      - name: data_type
        description: Snowflake data type of the column
      - name: is_nullable
        description: Whether the column allows null values

  # ===========================================================================
  # int_snowflake__column_query_access
  # ===========================================================================
  - name: int_snowflake__column_query_access
    description: >
      One row per (query_id, table_fqn, column_name) from Snowflake ACCESS_HISTORY.
      Extends int_snowflake__query_table_access by flattening the columns[] array within
      each accessed object, providing exact engine-reported column-level read attribution.
      Enterprise+ only — disabled when use_access_history_attribution = false.
    config:
      enabled: "{{ target.type == 'snowflake' and var('use_access_history_attribution', true) }}"
    columns:
      - name: query_id
        description: Snowflake query identifier
      - name: query_start_time
        description: Query start timestamp from ACCESS_HISTORY
      - name: table_fqn
        description: Fully-qualified table name parsed from objectName (uppercased)
      - name: table_database
        description: Database component of the table FQN
      - name: table_schema
        description: Schema component of the table FQN
      - name: table_name
        description: Table component of the table FQN
      - name: column_name
        description: Column name from ACCESS_HISTORY columns[] (uppercased)

  # ===========================================================================
  # int_snowflake__column_query_stats
  # ===========================================================================
  - name: int_snowflake__column_query_stats
    description: >
      Daily column-level query access counts per table, aggregated from
      int_snowflake__column_query_access. One row per (access_date, table_fqn, column_name).
      Incremental merge on column_query_stats_daily_key — processes new access_history
      data only, with a 1-day lookback buffer to handle ACCESS_HISTORY latency.
      Used by fct_snowflake__clustering_key_candidates for usage scoring, and by the
      refresh_column_cardinality macro to pre-filter which columns are worth scanning.
      Enterprise+ only — disabled when use_access_history_attribution = false.
    config:
      materialized: incremental
      enabled: "{{ target.type == 'snowflake' and var('use_access_history_attribution', true) }}"
    columns:
      - name: column_query_stats_daily_key
        description: Surrogate key derived from md5(access_date || table_fqn || column_name)
      - name: table_fqn
        description: Fully-qualified table name
      - name: table_database
        description: Database component of the table FQN
      - name: table_schema
        description: Schema component of the table FQN
      - name: table_name
        description: Table component of the table FQN
      - name: column_name
        description: Column name
      - name: access_date
        description: Calendar date of the query access
      - name: query_count
        description: Count of distinct query_ids that accessed this column on this date

  # ===========================================================================
  # int_snowflake__column_cardinality
  # ===========================================================================
  - name: int_snowflake__column_cardinality
    description: >
      Persistent store for column-level APPROX_COUNT_DISTINCT values produced by
      the refresh_column_cardinality macro. dbt creates the empty table schema on
      first run; all data is written and maintained exclusively by the macro, which
      runs as a post-hook on fct_snowflake__table_clustering_candidates. dbt never
      inserts rows directly — the incremental model always returns 0 rows, preserving
      macro-written data across runs.
    columns:
      - name: table_fqn
        description: Fully-qualified table name
      - name: column_name
        description: Column name
      - name: distinct_values
        description: Approximate distinct value count from APPROX_COUNT_DISTINCT
      - name: total_rows
        description: Total row count of the table at time of scan
      - name: calculated_at
        description: Timestamp when the macro last populated or updated this record