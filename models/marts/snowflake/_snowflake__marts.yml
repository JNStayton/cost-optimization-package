version: 2

models:
  - name: fct_snowflake__table_clustering_candidates
    description: >
      Daily snapshot of Snowflake tables evaluated as candidates for clustering.
      Each row represents one table assessed on a given day, scored by observed
      scan inefficiency and query activity over a configurable lookback window.

      Scoring uses the partition pruning ratio (partitions scanned / partitions total)
      as the primary signal — a ratio close to 1.0 means Snowflake is scanning nearly
      every micropartition, indicating that clustering would reduce scan overhead.
      When no query history is available for a table within the lookback window,
      the score falls back to a neutral multiplier of 0.5 rather than using structural
      fragmentation, which is not comparable to the pruning ratio on the same scale.
      Use avg_rows_per_micropartition as a supplementary structural signal in that case.

      Controlled by the following dbt variables:
        - clustering_candidates_min_size_gb (default 100)
        - clustering_candidates_lookback_days (default 7)
        - clustering_candidates_dbt_project_only (default true)
        - clustering_candidates_target_databases (default [])
        - clustering_candidates_target_schemas (default [])
    config:
      materialized: incremental
    columns:
      # ---------------------------------------------------------------------------
      # Snapshot metadata
      # ---------------------------------------------------------------------------
      - name: clustering_candidates_snapshot_key
        description: >
          Surrogate key for the snapshot. Derived from md5(snapshot_date || table_fqn).
          Used as the merge key for incremental runs — one record per table per day.

      - name: snapshot_date
        description: Calendar date of the snapshot. Combined with table_fqn to form the unique key.

      - name: analyzed_at
        description: Timestamp when this model run produced the record.

      # ---------------------------------------------------------------------------
      # Table identity
      # ---------------------------------------------------------------------------
      - name: database_name
        description: Snowflake database containing the table.

      - name: schema_name
        description: Snowflake schema containing the table.

      - name: table_name
        description: Name of the evaluated table.

      - name: table_fqn
        description: Fully-qualified table name in DATABASE.SCHEMA.TABLE format (uppercased).

      - name: dbt_model
        description: >
          dbt unique_id of the model that produced this table, if the table is a known
          dbt relation in the current project. Null when clustering_candidates_dbt_project_only
          is false and the table is not part of the project.

      - name: table_type
        description: >
          Normalized table classification. One of: Permanent Table, Transient Table,
          Materialized View.

      # ---------------------------------------------------------------------------
      # Recommendation
      # ---------------------------------------------------------------------------
      - name: is_candidate
        description: >
          Boolean flag indicating whether this table meets all criteria for a clustering
          recommendation. True when all of the following are satisfied:
            - At least one SELECT query was executed in the lookback window
            - Read/write query ratio > 1 (more reads than writes)
            - Table size meets or exceeds clustering_candidates_min_size_gb
            - Partition pruning ratio > 0.5 (Snowflake scanned more than half of all
              micropartitions on average, indicating limited pruning effectiveness)

      - name: score
        description: >
          Composite priority score for clustering candidacy. Higher values indicate
          tables where clustering is more likely to improve query performance.

          Formula: (query activity factor) * (scan inefficiency multiplier)

          Query activity factor: (select_count * avg_query_duration_s) + (read/write ratio * 10)
          Scan inefficiency multiplier: avg_partitions_scanned / avg_partitions_total when
          query history is available; 0.5 (neutral) when no query history exists in the
          lookback window.

          Scores are not normalized and should be used for relative ranking within a
          single snapshot_date, not compared across snapshots.

      # ---------------------------------------------------------------------------
      # Clustering state
      # ---------------------------------------------------------------------------
      - name: is_already_clustered
        description: >
          Whether the table already has a clustering key defined. When true, a recommendation
          indicates the existing clustering configuration may need to be reviewed or
          reconfigured rather than added for the first time. Use alongside clustering_key
          to understand the current state before taking action.

      - name: clustering_key
        description: >
          The existing clustering key definition, if one is configured (e.g. "LINEAR(date_col, region)").
          Null when is_already_clustered is false. Useful for evaluating whether the current
          key aligns with actual query filter patterns before deciding whether to reconfigure.

      # ---------------------------------------------------------------------------
      # Size & structure
      # ---------------------------------------------------------------------------
      - name: table_size_gb
        description: Active storage size of the table in gigabytes.

      - name: total_rows
        description: Approximate row count of the table.

      - name: current_micropartitions
        description: >
          Estimated total micropartition count. When query history is available, derived
          from the observed avg_partitions_total; otherwise approximated from active
          storage bytes using a 16MB-per-micropartition estimate.

      - name: avg_rows_per_micropartition
        description: >
          Average number of rows stored per micropartition (total_rows / current_micropartitions).

          This is a structural fragmentation signal. A higher value means rows are densely
          packed — each micropartition holds more data, and Snowflake can skip more of them
          during pruning. A lower value means the table is fragmented: many micropartitions
          each contain few rows, forcing Snowflake to open more of them per query regardless
          of filter selectivity.

          Why a low value is worth investigating: Snowflake targets roughly 16MB of compressed
          data per micropartition. If avg_rows_per_micropartition is very low relative to
          similar tables, the table may have accumulated micropartition fragmentation over
          time — often from incremental loads that insert small batches. This structural
          condition reduces the effectiveness of partition pruning even on well-clustered
          tables. When no query history is available in the lookback window (and the pruning
          ratio cannot be computed), this column is the best available indicator that a table
          may benefit from clustering or from a full recluster operation.

      - name: avg_partitions_scanned
        description: >
          Average number of micropartitions scanned per SELECT query over the lookback window.
          Derived from Snowflake query execution metadata. A high value relative to
          current_micropartitions indicates poor pruning effectiveness.

      # ---------------------------------------------------------------------------
      # Query activity
      # ---------------------------------------------------------------------------
      - name: select_count
        description: Total number of SELECT queries against this table in the lookback window.

      - name: dml_count
        description: >
          Total number of INSERT, UPDATE, DELETE, and MERGE queries against this table
          in the lookback window.

      - name: query_to_dml_ratio
        description: >
          Ratio of SELECT queries to DML operations (select_count / (dml_count + 1)).
          Higher values indicate read-heavy tables where clustering is more likely to
          deliver a return on the compute cost of maintaining cluster order.

      - name: avg_query_duration_s
        description: >
          Average execution time in seconds for SELECT queries against this table in the
          lookback window. High values alongside a high avg_partitions_scanned suggest
          that reduced scanning from clustering would meaningfully improve query latency.

  # ===========================================================================
  # fct_snowflake__table_materialization_candidates
  # ===========================================================================
  - name: fct_snowflake__table_materialization_candidates
    description: >
      dbt VIEW models that are candidates for conversion to TABLE materialization,
      scored by query volume and execution cost over a configurable lookback window.

      Query attribution uses query_text ILIKE matching against the view name for
      both Enterprise and Standard editions. ACCESS_HISTORY resolves views to their
      base tables and cannot be used for view-level attribution.

      Known limitation: view names that are substrings of other table or column
      identifiers may produce false-positive query matches.

      Controlled by the following dbt variables:
        - table_materialization_lookback_days   (default 30)
        - table_materialization_min_query_count (default 10)
    config:
      materialized: table
    columns:
      - name: snapshot_date
        description: Calendar date when this analysis was run.

      - name: analyzed_at
        description: Timestamp when this model run produced the record.

      - name: table_fqn
        description: Fully-qualified view name in DATABASE.SCHEMA.TABLE format (uppercased).

      - name: database_name
        description: Snowflake database containing the view.

      - name: schema_name
        description: Snowflake schema containing the view.

      - name: table_name
        description: Name of the evaluated view.

      - name: dbt_model
        description: dbt unique_id of the model that produced this view.

      - name: model_name
        description: dbt model name (filename without extension).

      - name: package_name
        description: dbt package the model belongs to.

      - name: select_count
        description: >
          Number of distinct SELECT queries that referenced this view by name
          in query_text over the lookback window.

      - name: avg_query_duration_s
        description: >
          Average execution time in seconds for SELECT queries referencing this
          view. Derived from execution_time_ms (excludes queue time).

      - name: total_gb_scanned
        description: >
          Total gigabytes scanned by SELECT queries referencing this view over
          the lookback window. A large value alongside high query volume is a
          strong signal that materialization would reduce repeated scan cost.

      - name: materialization_score
        description: >
          Composite priority score: select_count * avg_query_duration_s.
          Higher scores indicate views where materializing as a TABLE would
          deliver the greatest reduction in repeated computation cost.
          Use for relative ranking within a single snapshot_date.

      - name: recommendation
        description: >
          'Materialize as TABLE' when the view meets either cost threshold;
          'Monitor' otherwise.

      - name: recommendation_reason
        description: Human-readable explanation of the recommendation and the specific metrics that triggered it.

  # ===========================================================================
  # fct_snowflake__incremental_materialization_candidates
  # ===========================================================================
  - name: fct_snowflake__incremental_materialization_candidates
    description: >
      dbt TABLE models that are candidates for conversion to INCREMENTAL
      materialization, based on slow full-rebuild times and/or large table size
      over a configurable lookback window.

      A model is flagged when EITHER condition is met:
        - Max full-rebuild time >= incremental_candidates_min_build_time_sec
        - Table size >= incremental_candidates_min_size_gb

      Full rebuilds are detected via CREATE_TABLE_AS_SELECT events in
      QUERY_HISTORY. Build metrics are sourced from int_snowflake__table_query_stats_daily.

      Surfaces copy-pasteable starter code for the incremental_filter_template
      (is_incremental() WHERE block) and updated_model_config (config() block).
      When microbatch is a strong alternative (high insert ratio + TIMESTAMP
      column), microbatch_config_template is also populated.

      Controlled by the following dbt variables:
        - incremental_candidates_min_build_time_sec (default 300)
        - incremental_candidates_min_size_gb        (default 10)
        - incremental_candidates_lookback_days      (default 30)
    config:
      materialized: table
    columns:
      - name: snapshot_date
        description: Calendar date when this analysis was run.

      - name: analyzed_at
        description: Timestamp when this model run produced the record.

      - name: table_fqn
        description: Fully-qualified table name in DATABASE.SCHEMA.TABLE format (uppercased).

      - name: database_name
        description: Snowflake database containing the table.

      - name: schema_name
        description: Snowflake schema containing the table.

      - name: table_name
        description: Name of the evaluated table.

      - name: dbt_model
        description: dbt unique_id of the model that produced this table.

      - name: model_name
        description: dbt model name (filename without extension).

      - name: package_name
        description: dbt package the model belongs to.

      - name: table_size_gb
        description: Active storage size of the table in gigabytes.

      - name: table_build_count
        description: >
          Number of full table rebuilds (CREATE_TABLE_AS_SELECT) detected in
          the lookback window. A high count indicates the table is rebuilt
          frequently, amplifying the cost of full-refresh materialization.

      - name: max_build_time_sec
        description: >
          Maximum full-rebuild execution time in seconds over the lookback window.
          The primary signal for slow-build detection. Derived from execution_time_ms
          (excludes queue time).

      - name: avg_build_time_sec
        description: Average full-rebuild execution time in seconds over the lookback window.

      - name: select_count
        description: Total SELECT queries against this table in the lookback window.

      - name: avg_query_duration_s
        description: Average SELECT query execution time in seconds over the lookback window.

      - name: insert_count
        description: >
          Number of INSERT operations against this table in the lookback window.
          A high insert_count relative to update_count + merge_count indicates
          append-only data patterns, which favor the append or microbatch strategy.

      - name: update_count
        description: >
          Number of UPDATE operations. A non-zero value indicates records are
          mutated after insert, making merge the appropriate incremental strategy.

      - name: delete_count
        description: Number of DELETE operations against this table in the lookback window.

      - name: merge_count
        description: >
          Number of MERGE operations. A non-zero value confirms the table receives
          upsert patterns, making merge the appropriate incremental strategy.

      - name: suggested_strategy
        description: >
          Recommended dbt incremental strategy based on detected key columns and
          DML patterns. One of: merge, insert_overwrite, append, Manual Check.

          merge: recommended when a TIMESTAMP column is found. Handles both
          append-only and update patterns; use append as a cheaper alternative
          if records are confirmed immutable.

          insert_overwrite: recommended when only DATE columns are found and no
          TIMESTAMP. Efficiently replaces affected date partitions.

          append: recommended when only a numeric ID column is found and no
          date/timestamp. Only safe when IDs are monotonically increasing with
          no backfills or late-arriving records.

          Manual Check: no suitable key column detected; review table columns.

      - name: suggested_incremental_key
        description: >
          Best candidate column for the is_incremental() WHERE clause filter.
          TIMESTAMP columns are preferred over DATE columns. Used in
          incremental_filter_template.

      - name: suggested_unique_key
        description: >
          Best candidate column for the unique_key config parameter (used by
          the merge strategy for deduplication). Sourced from numeric _id or
          _key columns. '-- TODO: add your surrogate key column' when no
          suitable column is detected.

      - name: recommendation_reason
        description: Human-readable explanation of why this model was flagged, including the specific build time or size metrics that triggered it.

      - name: incremental_filter_template
        description: >
          Copy-pasteable incremental WHERE-filter block with the detected key column
          pre-filled. Add this to the model's WHERE clause. Adjust the lookback
          window (dateadd day offset) as needed for your data's late-arrival tolerance.

      - name: updated_model_config
        description: >
          Copy-pasteable model config block for an incremental model, with
          materialized='incremental', the suggested strategy, unique_key (if
          applicable), and on_schema_change='append_new_columns' pre-filled.
          Replace the existing config block at the top of the dbt model file with
          this output.

      - name: microbatch_config_template
        description: >
          Populated when the primary strategy is merge, a TIMESTAMP column exists,
          and the table's DML is predominantly INSERT (90%+ insert ratio). Provides
          a copy-pasteable microbatch config() block as an alternative to merge.

          Microbatch processes data in discrete time windows and is well-suited
          for event/log tables with high insert volume and a reliable event timestamp.
          The begin date must be set manually — dbt requires an explicit historical
          start date. No is_incremental() block is needed; dbt manages the filter
          automatically via event_time.

          Null when microbatch is not a recommended alternative for this table.


  # ===========================================================================
  # fct_snowflake__incremental_config_recommendations
  # ===========================================================================
  - name: fct_snowflake__incremental_config_recommendations
    description: >
      Model 2 of the incremental materialization recommendation flow. Depends on
      fct_snowflake__incremental_materialization_candidates (Model 1).

      For each candidate table, detects the best filter column (timestamp/date),
      ranks unique key candidates by naming convention, recommends a
      Snowflake-optimized incremental strategy, and generates a copy-pasteable
      dbt config template with the is_incremental() filter block pre-filled.

      Excludes 'Low ROI — Minimal Rebuild Redundancy' tables from Model 1.

      Strategy selection priority:
        1. External deletes detected + filter column  → delete+insert (flagged)
        2. External deletes detected, no filter       → merge (flagged)
        3. Unique key + filter + large scale          → delete+insert
        4. Unique key + filter, moderate scale        → merge
        5. Filter only, no DML, large scale           → microbatch
        6. Filter only, no DML                        → append
        7. Filter only, external DML, no key          → append (flag manual review)
        8. Unique key only                            → merge
        9. No key candidates                          → append

      Controlled by the following dbt variables:
        - incremental_large_table_row_threshold (default 10000000)
        - incremental_large_table_gb_threshold  (default 10)
    config:
      materialized: table
    columns:
      - name: snapshot_date
        description: Calendar date when this analysis was run.

      - name: analyzed_at
        description: Timestamp when this model run produced the record.

      - name: table_fqn
        description: Fully-qualified table name in DATABASE.SCHEMA.TABLE format (uppercased).

      - name: database_name
        description: Snowflake database containing the table.

      - name: schema_name
        description: Snowflake schema containing the table.

      - name: table_name
        description: Name of the evaluated table.

      - name: dbt_model
        description: dbt unique_id of the model that produced this table.

      - name: model_name
        description: dbt model name (filename without extension).

      - name: package_name
        description: dbt package the model belongs to.

      - name: redundancy_tier
        description: >
          Redundancy classification from Model 1. One of: Strong Candidate,
          Candidate, Candidate — Moderate Redundancy, Candidate — Verify Growth
          Signal, Candidate — Insufficient History.

      - name: redundancy_reason
        description: Human-readable explanation of the Model 1 redundancy signal.

      - name: rebuild_redundancy_rate
        description: >
          Fraction of each full rebuild that re-processes unchanged rows
          (rows_at_period_start / rows_at_period_end). Null when growth signal
          is unreliable or history is insufficient.

      - name: est_daily_redundant_gb_scanned
        description: >
          Estimated GB scanned per day that is redundant
          (size_gb × builds_per_day × rebuild_redundancy_rate). Null when
          growth signal is unreliable.

      - name: table_size_gb
        description: Active storage size of the table in gigabytes.

      - name: total_rows
        description: Approximate row count of the table.

      - name: table_build_count
        description: Number of full table rebuilds detected in the analysis window.

      - name: builds_per_day
        description: Average number of full rebuilds per day over the analysis window.

      - name: max_build_time_sec
        description: Maximum full-rebuild execution time in seconds over the analysis window.

      - name: avg_build_time_sec
        description: Average full-rebuild execution time in seconds over the analysis window.

      - name: dml_count
        description: Total INSERT, UPDATE, DELETE, and MERGE operations in the analysis window.

      - name: insert_count
        description: INSERT operations in the analysis window.

      - name: update_count
        description: UPDATE operations in the analysis window.

      - name: delete_count
        description: >
          DELETE operations in the analysis window. Non-zero indicates external
          processes are deleting from this table, which influences strategy selection.

      - name: merge_count
        description: MERGE operations in the analysis window.

      - name: incremental_strategy
        description: >
          Recommended dbt incremental strategy. One of: append, merge,
          delete+insert, microbatch. See strategy_notes for rationale.

      - name: has_filter_column
        description: True when a timestamp or date column was detected for use in the is_incremental() filter.

      - name: has_unique_key_candidate
        description: True when at least one plausible unique key candidate was detected by naming convention.

      - name: has_external_deletes
        description: True when delete_count > 0, indicating an external process deletes rows from this table.

      - name: is_large_table
        description: >
          True when total_rows > incremental_large_table_row_threshold OR
          table_size_gb > incremental_large_table_gb_threshold. Used to prefer
          delete+insert over merge at large scale.

      - name: suggested_filter_column
        description: >
          Best timestamp or date column for the is_incremental() WHERE filter,
          ranked by name pattern. Null when no qualifying column is found.
          Detection priority: *updated_at* / *modified_at* > *loaded_at* /
          *ingested_at* / *inserted_at* / *synced_at* > *created_at* /
          *event_date* / *event_time* / *event_timestamp* > any timestamp/date column.

      - name: unique_key_candidates
        description: >
          Array of up to 3 plausible unique key column names, ordered by naming
          convention rank. Uniqueness is not verified — run validate_uniqueness_sql
          before implementing.

      - name: strategy_notes
        description: Human-readable rationale for the recommended strategy, including key column names and any caveats.

      - name: validate_uniqueness_sql
        description: >
          SQL snippet to verify uniqueness of the top unique key candidate before
          implementing. Returns is_unique = TRUE when the column has no duplicates.
          Null when no unique key candidate was detected.

      - name: dbt_config_template
        description: >
          Copy-pasteable dbt config block and is_incremental() filter for the
          recommended strategy, with the detected column names pre-filled.
          Replace the existing config() block at the top of your model file.
          For microbatch, set the begin date manually before running.
          Unique key placeholders (<unique_key>) require manual identification
          when no candidate was detected.

  # ===========================================================================
  # fct_snowflake__clustering_key_candidates
  # ===========================================================================
  - name: fct_snowflake__clustering_key_candidates
    description: >
      Daily snapshot of column-level clustering key recommendations for tables
      identified as candidates by fct_snowflake__table_clustering_candidates.
      One row per (snapshot_date, table_fqn, column_name) — only the top 3
      recommended columns per table are emitted.

      Scoped to the top N candidate tables by score (clustering_key_cardinality_table_limit,
      default 10). Only tables with is_candidate = true from today's snapshot are evaluated.

      Scoring combines avg_rows_per_value (total_rows / distinct_values) with confirmed
      WHERE and JOIN usage from query history. Only columns with at least one WHERE or
      JOIN usage in the lookback window are recommended. Cardinality data is populated by
      the refresh_column_cardinality macro post-hook on fct_snowflake__table_clustering_candidates,
      guaranteeing it is available before this model runs.

      Controlled by the following dbt variables:
        - clustering_key_cardinality_table_limit (default 10)
        - clustering_candidates_lookback_days    (default 7)
        - use_access_history_attribution         (default true)
    config:
      materialized: incremental
    columns:
      # ---------------------------------------------------------------------------
      # Snapshot metadata
      # ---------------------------------------------------------------------------
      - name: clustering_key_candidate_snapshot_key
        description: >
          Surrogate key for the snapshot. Derived from md5(snapshot_date || table_fqn || column_name).
          Used as the merge key for incremental runs — one record per column per table per day.

      - name: snapshot_date
        description: Calendar date of the snapshot.

      - name: analyzed_at
        description: Timestamp when this model run produced the record.

      # ---------------------------------------------------------------------------
      # Table identity
      # ---------------------------------------------------------------------------
      - name: table_fqn
        description: Fully-qualified table name in DATABASE.SCHEMA.TABLE format (uppercased).

      - name: database_name
        description: Snowflake database containing the table.

      - name: schema_name
        description: Snowflake schema containing the table.

      - name: table_name
        description: Name of the evaluated table.

      - name: dbt_model
        description: dbt unique_id of the model that produced this table.

      # ---------------------------------------------------------------------------
      # Column
      # ---------------------------------------------------------------------------
      - name: column_name
        description: Name of the evaluated column.

      - name: ordinal_position
        description: Column position in the table definition (1-based).

      - name: data_type
        description: Snowflake data type of the column.

      # ---------------------------------------------------------------------------
      # Recommendation
      # ---------------------------------------------------------------------------
      - name: recommended_key_position
        description: >
          Rank of this column as a clustering key for its table, ordered by column_score
          descending. Position 1 is the top recommendation. Only positions 1–3 are emitted.

      - name: column_score
        description: >
          Composite column-level score combining cardinality and WHERE/JOIN usage signals.
          Formula: (avg_rows_per_value / total_rows * 100) + (usage_count * 20)
          Scores are relative within a table — use recommended_key_position for ranking.

      # ---------------------------------------------------------------------------
      # Cardinality
      # ---------------------------------------------------------------------------
      - name: distinct_values
        description: >
          Approximate distinct value count from APPROX_COUNT_DISTINCT, populated by the
          refresh_column_cardinality macro. Null on first run or if the column was not
          included in the macro's pre-filtered column set for this table.

      - name: avg_rows_per_value
        description: >
          Average number of rows per distinct value (total_rows / distinct_values).
          Higher values indicate lower cardinality — more rows share each distinct value,
          which means Snowflake micropartitions cover fewer distinct values and pruning
          is more effective. Null when distinct_values is null.

      - name: cardinality_calculated_at
        description: Timestamp when the refresh_column_cardinality macro last populated this column's cardinality.

      # ---------------------------------------------------------------------------
      # Usage
      # ---------------------------------------------------------------------------
      - name: where_query_count
        description: >
          Number of distinct queries in the lookback window where this column appeared
          in a WHERE clause, matched via query_text pattern. Enterprise+ uses ACCESS_HISTORY
          for precise column-to-query attribution before matching; Standard edition scopes
          by table name in query_text. Known limitation: column aliasing is not detected.

      - name: join_query_count
        description: >
          Number of distinct queries in the lookback window where this column appeared
          in a JOIN...ON clause, matched via query_text pattern. Same attribution approach
          and aliasing limitation as where_query_count.

      - name: usage_count
        description: >
          Sum of where_query_count and join_query_count. Columns with usage_count = 0
          are excluded from recommendations entirely — confirmed filter or join usage
          is required for a column to be considered a clustering key candidate.
